name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.15"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile --no-cache

      - name: Deploy Next.js app to Workers
        # main / master -> production deploy
        # other branches -> preview upload
        id: deploy-step
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN || secrets.CF_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAHABAH_DEV_ADMIN_EMAIL: ${{ secrets.MAHABAH_DEV_ADMIN_EMAIL }}
          MAHABAH_DEV_ADMIN_PASSWORD: ${{ secrets.MAHABAH_DEV_ADMIN_PASSWORD }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            export CLOUDFLARE_API_TOKEN
            export CF_API_TOKEN="$CLOUDFLARE_API_TOKEN"
            export CF_TOKEN="$CLOUDFLARE_API_TOKEN"
          elif [ -n "$CF_API_TOKEN" ]; then
            export CLOUDFLARE_API_TOKEN="$CF_API_TOKEN"
            export CF_TOKEN="$CF_API_TOKEN"
          elif [ -n "$CF_TOKEN" ]; then
            export CLOUDFLARE_API_TOKEN="$CF_TOKEN"
          else
            echo "Missing Cloudflare API token."
            echo "Set one of: CF_TOKEN, CF_API_TOKEN, or CLOUDFLARE_API_TOKEN."
            exit 1
          fi

          if [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
            bun run deploy
          else
            bun run upload
          fi

      - name: Upload sourcemaps (optional)
        if: always()
        run: echo "Deploy completed. Configure Workers Logs/Sentry integration if needed."
